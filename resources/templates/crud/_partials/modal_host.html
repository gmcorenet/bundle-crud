<div class="gmcrud-modal" data-gmcrud-modal data-gmui-modal hidden>
    <div class="crud-gmcore-modal-backdrop" data-gmcrud-modal-close></div>
    <div class="crud-gmcore-modal-dialog" aria-label="CRUD Dialog">
        <div data-gmcrud-modal-content></div>
    </div>
</div>

<div class="gmcrud-modal gmcrud-confirm" data-gmcrud-confirm-modal data-gmui-modal hidden>
    <div class="crud-gmcore-modal-backdrop" data-gmcrud-confirm-cancel></div>
    <div class="crud-gmcore-confirm-dialog">
        <div class="crud-gmcore-confirm-visual">
            <span class="crud-gmcore-confirm-icon gmui-confirm-icon" data-gmcrud-confirm-icon>!</span>
        </div>
        <div class="crud-gmcore-confirm-header">
            <h3 data-gmcrud-confirm-title>Confirm</h3>
        </div>
        <div class="crud-gmcore-confirm-body">
            <p data-gmcrud-confirm-subtitle>Are you sure?</p>
            <p data-gmcrud-confirm-message></p>
        </div>
        <div class="crud-gmcore-confirm-actions">
            <button type="button" class="gmui-btn is-ghost" data-gmcrud-confirm-cancel></button>
            <button type="button" class="gmui-btn is-danger" data-gmcrud-confirm-accept></button>
        </div>
    </div>
</div>
